  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000000;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      touch-action: none;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

  <script>
    // Global error catcher for debugging
    window.onerror = function(msg, url, line, col, error) {
      var errDiv = document.getElementById('error-display');
      if (!errDiv) {
        errDiv = document.createElement('div');
        errDiv.id = 'error-display';
        errDiv.style.cssText = 'position:fixed;top:10px;left:10px;right:10px;z-index:99999;background:rgba(255,0,0,0.9);color:#fff;padding:10px;font-family:monospace;font-size:12px;word-break:break-all;';
        document.body.appendChild(errDiv);
      }
      errDiv.textContent = 'ERROR: ' + msg + ' (line ' + line + ')';
      console.error('GAME ERROR:', msg, url, line, col, error);
      return false;
    };
    window.addEventListener('unhandledrejection', function(e) {
      var errDiv = document.getElementById('error-display');
      if (!errDiv) {
        errDiv = document.createElement('div');
        errDiv.id = 'error-display';
        errDiv.style.cssText = 'position:fixed;top:10px;left:10px;right:10px;z-index:99999;background:rgba(255,0,0,0.9);color:#fff;padding:10px;font-family:monospace;font-size:12px;word-break:break-all;';
        document.body.appendChild(errDiv);
      }
      errDiv.textContent = 'PROMISE ERROR: ' + (e.reason && e.reason.message || e.reason);
      console.error('UNHANDLED REJECTION:', e.reason);
    });

    // Prevent default touch behaviors for mobile gaming
    document.addEventListener('touchstart', function(e) {
      if (e.target.tagName === 'CANVAS') {
        e.preventDefault();
      }
    }, { passive: false });
    document.addEventListener('touchmove', function(e) {
      if (e.target.tagName === 'CANVAS') {
        e.preventDefault();
      }
    }, { passive: false });

    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').catch(function() {});
      });
    }
  </script>
